<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>休息大过天</title>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%); 
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 8px 12px;
            background: linear-gradient(135deg, #5A7D6C 0%, #4A6B5A 50%, #3D5A4D 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { font-size: 16px; font-weight: bold; }
        .month-nav { display: flex; align-items: center; gap: 10px; }
        .month-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
        }
        .month-label { font-size: 16px; min-width: 80px; text-align: center; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px;
            padding: 16px;
            flex: 1;
        }
        .slot {
            height: 100%;
            min-height: 80px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .slot.free { 
            background: linear-gradient(135deg, #7B9E89 0%, #6B8E7B 50%, #5A7D6C 100%);
            box-shadow: 0 4px 12px rgba(91, 125, 108, 0.3);
        }
        .slot.used { 
            background: linear-gradient(135deg, #3a3a4a 0%, #2d2d3d 50%, #2a2a38 100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .slot.free:nth-child(6n+1) { background: linear-gradient(135deg, #7B9E89 0%, #6B8E7B 100%); }
        .slot.free:nth-child(6n+2) { background: linear-gradient(135deg, #8EADBB 0%, #7A9CA6 100%); }
        .slot.free:nth-child(6n+3) { background: linear-gradient(135deg, #B5A3B5 0%, #9E8CA0 100%); }
        .slot.free:nth-child(6n+4) { background: linear-gradient(135deg, #C4B59D 0%, #ADA285 100%); }
        .slot.free:nth-child(6n+5) { background: linear-gradient(135deg, #A3B5C4 0%, #8BA0B0 100%); }
        .slot.free:nth-child(6n+6) { background: linear-gradient(135deg, #9EB5A3 0%, #86A08D 100%); }
        .slot .audio-icon { font-size: 16px; margin-top: 8px; display: block; }
        
        .history { padding: 12px 16px; background: linear-gradient(180deg, #1e1e32 0%, #252538 100%); }
        .history-title { color: #8EADBB; font-size: 13px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .history-title { color: #666; font-size: 13px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .remaining { color: #4CAF50; font-size: 13px; }
        .history-items { display: flex; flex-wrap: wrap; gap: 6px; }
        .history-item { background: #333; padding: 6px 12px; border-radius: 16px; font-size: 13px; color: #aaa; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #222; padding: 20px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center; }
        .modal-title { text-align: center; margin-bottom: 16px; font-size: 17px; }
        .voice-btn { background: #4CAF50; border: none; color: #fff; padding: 12px 32px; border-radius: 24px; font-size: 15px; cursor: pointer; display: inline-block; margin: 16px auto 0; }
        .voice-btn.recording { background: #f44336; animation: pulse 1s infinite; }
        .audio-btns { display: none; gap: 8px; justify-content: center; margin-top: 12px; }
        .play-btn { background: #2196F3; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; font-size: 14px; }
        .re-record-btn { background: #f44336; padding: 10px 20px; border-radius: 20px; border: none; color: #fff; font-size: 14px; }
        .audio-status { text-align: center; color: #4CAF50; margin-top: 8px; font-size: 14px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .day-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .day-btn { aspect-ratio: 1; background: #333; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .day-btn.sel { background: #4CAF50; }
        .time-group { display: flex; justify-content: center; gap: 30px; margin: 16px 0; }
        .actions { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .btn-cancel { background: #444; color: #aaa; }
        .btn-confirm { background: #4CAF50; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">休息大过天</div>
        <div class="month-nav">
            <button class="month-btn" onclick="changeMonth(-1)">‹</button>
            <span class="month-label" id="monthLabel"></span>
            <button class="month-btn" onclick="changeMonth(1)">›</button>
        </div>
    </div>
    
    <div class="grid" id="grid"></div>
    
    <div class="history">
        <div class="history-title">
            <span>本月休假记录</span>
            <span class="remaining" id="remaining"></span>
        </div>
        <div class="history-items" id="historyItems"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">选择日期</div>
            <div class="day-grid" id="dayGrid"></div>
            <div class="time-group">
                <label><input type="radio" name="time" value="上午" checked> 上午</label>
                <label><input type="radio" name="time" value="下午"> 下午</label>
            </div>
            <button class="voice-btn" id="voiceBtn" onclick="toggleRecord()">🎤 请假理由</button>
            <div class="audio-status" id="audioStatus"></div>
            <div class="audio-btns" id="audioBtns">
                <button class="play-btn" onclick="playCurrent()">▶ 试听</button>
                <button class="re-record-btn" onclick="reRecord()">🔄 重录</button>
            </div>
            <div class="actions">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-confirm" onclick="confirmSelect()">确定</button>
            </div>
        </div>
    </div>

    <script>
        var TOTAL = 10;
        var currentMonth = 0;
        var currentIdx = 0;
        var selDay = 0;
        var isRecording = false;
        var tempAudio = null;
        var audios = {};

        function getKey() { return 'leave_' + currentMonth; }
        function getData() { var d = localStorage.getItem(getKey()); return d ? JSON.parse(d) : []; }
        function saveData(data) { localStorage.setItem(getKey(), JSON.stringify(data)); }

        function changeMonth(d) {
            var y = Math.floor(currentMonth / 100);
            var m = currentMonth % 100;
            m += d;
            if (m < 1) { y--; m = 12; }
            if (m > 12) { y++; m = 1; }
            currentMonth = y * 100 + m;
            render();
        }

        function render() {
            var y = Math.floor(currentMonth / 100);
            var m = currentMonth % 100;
            document.getElementById('monthLabel').textContent = y + '年' + m + '月';
            
            var data = getData();
            var grid = document.getElementById('grid');
            grid.innerHTML = '';
            var used = 0;
            
            for (var i = 0; i < TOTAL; i++) {
                var slot = data[i];
                var div = document.createElement('div');
                if (slot) {
                    div.className = 'slot used';
                    var content = '<div>' + slot.day + '日 ' + slot.time + '</div>';
                    if (audios[i]) {
                        content += '<div class="audio-icon" onclick="event.stopPropagation();playAudio(' + i + ')">📢 播放理由</div>';
                    }
                    div.innerHTML = content;
                } else {
                    div.className = 'slot free';
                    div.innerHTML = '<span class="time">请假</span>';
                }
                (function(idx) {
                    div.onclick = function() { openModal(idx); };
                })(i);
                grid.appendChild(div);
            }
            
            // Sort: used slots first
            var slots = Array.from(grid.children);
            slots.sort(function(a, b) {
                if (a.className.includes('used') && !b.className.includes('used')) return -1;
                if (!a.className.includes('used') && b.className.includes('used')) return 1;
                return 0;
            });
            slots.forEach(function(s) { grid.appendChild(s); });
            
            var list = document.getElementById('historyItems');
            list.innerHTML = '';
            var records = data.filter(function(s) { return s; }).sort(function(a,b) { return a.day - b.day; });
            if (records.length === 0) {
                list.innerHTML = '<span style="color:#444">暂无</span>';
            } else {
                records.forEach(function(r) {
                    var item = document.createElement('span');
                    item.className = 'history-item';
                    item.textContent = r.day + '日' + r.time;
                    list.appendChild(item);
                });
            }
            
            // 计算剩余假期
            var used = records.length;
            var remaining = (TOTAL - used) * 0.5;
            document.getElementById('remaining').textContent = '剩余假期 ' + remaining + '天';
        }

        function openModal(idx) {
            var data = getData();
            if (data[idx]) return;
            currentIdx = idx;
            
            var now = new Date();
            var nowMonth = now.getFullYear() * 100 + now.getMonth() + 1;
            if (currentMonth > nowMonth) {
                alert('暂不支持预约未来月份');
                return;
            }
            
            var today = now.getDate();
            var startDay = Math.max(1, today - 6);
            var dayGrid = document.getElementById('dayGrid');
            dayGrid.innerHTML = '';
            
            for (var d = startDay; d <= today; d++) {
                var btn = document.createElement('button');
                btn.className = 'day-btn';
                btn.textContent = d;
                btn.onclick = function() {
                    selDay = this.textContent;
                    document.querySelectorAll('.day-btn').forEach(function(b) { b.classList.remove('sel'); });
                    this.classList.add('sel');
                };
                dayGrid.appendChild(btn);
            }
            
            // Reset audio state
            tempAudio = null;
            document.getElementById('voiceBtn').style.display = 'inline-block';
            document.getElementById('voiceBtn').textContent = '🎤 请假理由';
            document.getElementById('voiceBtn').classList.remove('recording');
            document.getElementById('audioStatus').textContent = '';
            document.getElementById('audioBtns').style.display = 'none';
            
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            selDay = 0;
            tempAudio = null;
        }

        function confirmSelect() {
            if (!selDay) return alert('请选择日期');
            var time = document.querySelector('input[name="time"]:checked').value;
            var data = getData();
            data[currentIdx] = { day: parseInt(selDay), time: time };
            if (tempAudio) {
                audios[currentIdx] = tempAudio;
            }
            saveData(data);
            closeModal();
            render();
        }

        function toggleRecord() {
            var btn = document.getElementById('voiceBtn');
            if (isRecording) {
                AndroidBridge.stopRecording();
                btn.classList.remove('recording');
                btn.textContent = '🎤 请假理由';
                isRecording = false;
            } else {
                AndroidBridge.startRecording();
                btn.classList.add('recording');
                btn.textContent = '🎤 录音中...';
                isRecording = true;
            }
        }
        
        // Called from native code when recording completes
        function onRecordingComplete(fileUrl) {
            tempAudio = fileUrl;
            isRecording = false;
            var btn = document.getElementById('voiceBtn');
            btn.classList.remove('recording');
            btn.textContent = '🎤 请假理由';
            btn.style.display = 'none';
            document.getElementById('audioStatus').textContent = '✓ 录音完成';
            document.getElementById('audioBtns').style.display = 'flex';
            console.log('Recording complete: ' + fileUrl);
        }
        
        function onRecordingAutoStop(fileUrl) {
            tempAudio = fileUrl;
            isRecording = false;
            var btn = document.getElementById('voiceBtn');
            btn.classList.remove('recording');
            btn.textContent = '🎤 请假理由';
            btn.style.display = 'none';
            document.getElementById('audioStatus').textContent = '✓ 录音完成 (7秒)';
            document.getElementById('audioBtns').style.display = 'flex';
            console.log('Recording auto-stop: ' + fileUrl);
        }
        
        function onRecordingError(error) {
            alert('录音失败: ' + error);
            isRecording = false;
            var btn = document.getElementById('voiceBtn');
            btn.classList.remove('recording');
            btn.textContent = '🎤 请假理由';
        }
        
        function playCurrent() {
            console.log('Playing: ' + tempAudio);
            if (tempAudio) {
                var audio = new Audio(tempAudio);
                audio.play();
                audio.onerror = function(e) {
                    console.log('Play error: ' + e.message);
                    alert('播放失败');
                };
            } else {
                alert('没有录音');
            }
        }

        function reRecord() {
            tempAudio = null;
            document.getElementById('voiceBtn').style.display = 'inline-block';
            document.getElementById('audioStatus').textContent = '';
            document.getElementById('audioBtns').style.display = 'none';
        }

        function playAudio(idx) {
            var data = audios[idx];
            if (data) {
                console.log('Playing audio ' + idx + ': ' + data);
                var audio = new Audio(data);
                audio.play();
            }
        }

        function init() {
            var now = new Date();
            currentMonth = now.getFullYear() * 100 + (now.getMonth() + 1);
            var audioData = localStorage.getItem(getKey() + '_ audios');
            if (audioData) audios = JSON.parse(audioData);
            render();
        }

        init();
    </script>
</body>
</html>
